services:
  vault:
    image: hashicorp/vault:1.18
    container_name: vault-poc
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add: ["IPC_LOCK"]
    volumes:
      - ./vault:/vault
  postgres:
    image: postgres:16
    container_name: postgres-poc
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: vaultadmin
      POSTGRES_PASSWORD: vaultadmin
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
